<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="720" height="380" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="718" height="378" rx="14" fill="none" stroke="#e2e8f0"/>
  <text x="360" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#1b2a4a">Deux « variances » à ne pas confondre</text>
  <text x="360" y="49" text-anchor="middle" font-size="12" fill="#64748b">« Étalement » = à quel point des valeurs sont éparpillées. Mais ce qui s'éparpille n'est pas la même chose des deux côtés.</text>

  <rect x="28" y="70" width="332" height="232" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
