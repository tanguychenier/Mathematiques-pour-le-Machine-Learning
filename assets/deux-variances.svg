  <line x1="50" y1="298" x2="330" y2="152" stroke="#0f766e" stroke-width="2.5"/>
  <circle cx="70" cy="300.6" r="4" fill="#1b2a4a"><animate attributeName="r" values="4;5;4" dur="2.5s" repeatCount="indefinite"/></circle><circle cx="96" cy="263.0" r="4" fill="#1b2a4a"><animate attributeName="r" values="4;5;4" dur="2.63s" repeatCount="indefinite"/></circle><circle cx="122" cy="268.5" r="4" fill="#1b2a4a"><animate attributeName="r" values="4;5;4" dur="2.76s" repeatCount="indefinite"/></circle><circle cx="150" cy="230.9" r="4" fill="#1b2a4a"><animate attributeName="r" values="4;5;4" dur="2.89s" repeatCount="indefinite"/></circle><circle cx="176" cy="238.3" r="4" fill="#1b2a4a"><animate attributeName="r" values="4;5;4" dur="3.02s" repeatCount="indefinite"/></circle><circle cx="204" cy="234.7" r="4" fill="#1b2a4a"><animate attributeName="r" values="4;5;4" dur="3.15s" repeatCount="indefinite"/></circle><circle cx="232" cy="194.1" r="4" fill="#1b2a4a"><animate attributeName="r" values="4;5;4" dur="3.2800000000000002s" repeatCount="indefinite"/></circle><circle cx="260" cy="200.5" r="4" fill="#1b2a4a"><animate attributeName="r" values="4;5;4" dur="3.41s" repeatCount="indefinite"/></circle><circle cx="290" cy="158.9" r="4" fill="#1b2a4a"><animate attributeName="r" values="4;5;4" dur="3.54s" repeatCount="indefinite"/></circle><circle cx="316" cy="166.3" r="4" fill="#1b2a4a"><animate attributeName="r" values="4;5;4" dur="3.67s" repeatCount="indefinite"/></circle>
  <text x="194" y="92" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1b2a4a">σ² : le bruit des DONNÉES</text>
  <text x="194" y="288" text-anchor="middle" font-size="11" fill="#64748b">les points s'écartent de la vraie droite</text>

  <rect x="372" y="70" width="320" height="232" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="390" y1="278" x2="670" y2="166" stroke="#2563eb" stroke-width="1.8" opacity="0"><animate attributeName="opacity" values="0;0;0.85;0.85;0" keyTimes="0;0.10;0.16;0.94;1" dur="7s" repeatCount="indefinite"/></line><line x1="390" y1="310" x2="670" y2="136" stroke="#2563eb" stroke-width="1.8" opacity="0"><animate attributeName="opacity" values="0;0;0.85;0.85;0" keyTimes="0;0.23;0.29;0.94;1" dur="7s" repeatCount="indefinite"/></line><line x1="390" y1="291" x2="670" y2="143" stroke="#2563eb" stroke-width="1.8" opacity="0"><animate attributeName="opacity" values="0;0;0.85;0.85;0" keyTimes="0;0.36;0.42;0.94;1" dur="7s" repeatCount="indefinite"/></line><line x1="390" y1="314" x2="670" y2="172" stroke="#2563eb" stroke-width="1.8" opacity="0"><animate attributeName="opacity" values="0;0;0.85;0.85;0" keyTimes="0;0.49;0.55;0.94;1" dur="7s" repeatCount="indefinite"/></line><line x1="390" y1="283" x2="670" y2="149" stroke="#2563eb" stroke-width="1.8" opacity="0"><animate attributeName="opacity" values="0;0;0.85;0.85;0" keyTimes="0;0.62;0.68;0.94;1" dur="7s" repeatCount="indefinite"/></line><line x1="390" y1="303" x2="670" y2="163" stroke="#2563eb" stroke-width="1.8" opacity="0"><animate attributeName="opacity" values="0;0;0.85;0.85;0" keyTimes="0;0.75;0.81;0.94;1" dur="7s" repeatCount="indefinite"/></line>
  <line x1="390" y1="298" x2="670" y2="152" stroke="#0f766e" stroke-width="2.5"/>
  <text x="532" y="92" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1b2a4a">variance de l'estimateur : la RÉPONSE</text>
  <text x="532" y="288" text-anchor="middle" font-size="11" fill="#64748b">la droite trouvée change selon l'échantillon</text>

  <text x="360" y="324" text-anchor="middle" font-size="12.5" fill="#1b2a4a">Recette d'estimation : les données sont les ingrédients, la droite trouvée est le plat.</text>
  <text x="360" y="344" text-anchor="middle" font-size="12.5" fill="#1b2a4a">À gauche, des ingrédients qui tremblent ; à droite, le plat qui change quand on change d'ingrédients.</text>
  <text x="360" y="366" text-anchor="middle" font-size="11" fill="#94a3b8">La droite verte est la vraie relation (la même partout) ; le bleu, ce qu'on estime à partir d'un échantillon.</text>
</svg>
