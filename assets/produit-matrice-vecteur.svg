  <text x="169" y="302" text-anchor="middle" font-size="13" fill="#64748b">X (n lignes × d colonnes)</text>
  <text x="323" y="282" text-anchor="middle" font-size="13" fill="#0891b2">θ (poids)</text>
  <text x="433" y="302" text-anchor="middle" font-size="13" fill="#ea580c">ŷ (prédictions)</text>
  <text x="360" y="350" text-anchor="middle" font-size="15" fill="#1b2a4a" opacity="0">ŷ<tspan font-size="11" dy="3">1</tspan><tspan dy="-3"> = 2×1 + 1×2 + 0×1 = </tspan><tspan font-weight="700" fill="#ea580c">4</tspan><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.0;0.004;0.246;0.25;1" dur="11.0s" repeatCount="indefinite"/></text>
  <text x="360" y="350" text-anchor="middle" font-size="15" fill="#1b2a4a" opacity="0">ŷ<tspan font-size="11" dy="3">2</tspan><tspan dy="-3"> = 1×1 + 3×2 + 1×1 = </tspan><tspan font-weight="700" fill="#ea580c">8</tspan><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.254;0.496;0.5;1" dur="11.0s" repeatCount="indefinite"/></text>
  <text x="360" y="350" text-anchor="middle" font-size="15" fill="#1b2a4a" opacity="0">ŷ<tspan font-size="11" dy="3">3</tspan><tspan dy="-3"> = 0×1 + 2×2 + 2×1 = </tspan><tspan font-weight="700" fill="#ea580c">6</tspan><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5;0.504;0.746;0.75;1" dur="11.0s" repeatCount="indefinite"/></text>
  <text x="360" y="350" text-anchor="middle" font-size="15" fill="#1b2a4a" opacity="0">ŷ<tspan font-size="11" dy="3">4</tspan><tspan dy="-3"> = 3×1 + 1×2 + 1×1 = </tspan><tspan font-weight="700" fill="#ea580c">6</tspan><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.75;0.754;0.996;1.0;1" dur="11.0s" repeatCount="indefinite"/></text>
