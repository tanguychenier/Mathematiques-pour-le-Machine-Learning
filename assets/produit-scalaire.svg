<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="du" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#2563eb"/></marker>
    <marker id="dv" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#ea580c"/></marker>
  </defs>
  <rect width="720" height="380" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="718" height="378" rx="14" fill="none" stroke="#e2e8f0"/>
  <text x="360" y="31" text-anchor="middle" font-size="18.5" font-weight="700" fill="#1b2a4a">Le produit scalaire : deux flèches vont-elles dans le même sens ?</text>
  <text x="360" y="50" text-anchor="middle" font-size="12" fill="#64748b">On projette b sur a (son ombre, la barre épaisse). Le produit scalaire mesure cette ombre, fois la longueur de a.</text>
  <text x="360" y="74" text-anchor="middle" font-size="11.5" fill="#94a3b8">Plus les flèches s'alignent, plus l'ombre est grande ; perpendiculaires, l'ombre est nulle ; opposées, elle compte en négatif.</text>
    <rect x="55" y="120" width="190" height="170" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="98" y1="250" x2="98" y2="250" stroke="#16a34a" stroke-width="7" opacity="0.5" stroke-linecap="round"><animate attributeName="x2" values="98;98;166.8;166.8;98" keyTimes="0;0.2;0.55;0.9;1" dur="5.0s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/></line>
  <line x1="166.8" y1="201.8" x2="166.8" y2="201.8" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"><animate attributeName="x2" values="166.8;166.8;166.8;166.8;166.8" keyTimes="0;0.2;0.55;0.9;1" dur="5.0s" repeatCount="indefinite"/><animate attributeName="y2" values="201.8;201.8;250.0;250.0;201.8" keyTimes="0;0.2;0.55;0.9;1" dur="5.0s" repeatCount="indefinite"/></line>
  <line x1="98" y1="250" x2="194" y2="250" stroke="#2563eb" stroke-width="3.5" marker-end="url(#du)"/>
  <text x="198" y="255" font-size="13" fill="#2563eb" font-weight="700">a</text>
  <line x1="98" y1="250" x2="166.8" y2="201.8" stroke="#ea580c" stroke-width="3.5" marker-end="url(#dv)"/>
  <text x="173" y="196" font-size="13" fill="#ea580c" font-weight="700">b</text>
  <circle cx="98" cy="250" r="3.5" fill="#475569"/>
  <text x="150" y="312" text-anchor="middle" font-size="15" font-weight="700" fill="#16a34a">a · b &gt; 0</text>
  <text x="150" y="330" text-anchor="middle" font-size="10.5" fill="#64748b">même sens : l'ombre est positive</text>
  <rect x="265" y="120" width="190" height="170" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="308" y1="250" x2="308" y2="250" stroke="#64748b" stroke-width="7" opacity="0.5" stroke-linecap="round"><animate attributeName="x2" values="308;308;308.0;308.0;308" keyTimes="0;0.2;0.55;0.9;1" dur="5.0s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/></line>
  <line x1="308.0" y1="166.0" x2="308.0" y2="166.0" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"><animate attributeName="x2" values="308.0;308.0;308.0;308.0;308.0" keyTimes="0;0.2;0.55;0.9;1" dur="5.0s" repeatCount="indefinite"/><animate attributeName="y2" values="166.0;166.0;250.0;250.0;166.0" keyTimes="0;0.2;0.55;0.9;1" dur="5.0s" repeatCount="indefinite"/></line>
  <line x1="308" y1="250" x2="404" y2="250" stroke="#2563eb" stroke-width="3.5" marker-end="url(#du)"/>
  <text x="408" y="255" font-size="13" fill="#2563eb" font-weight="700">a</text>
  <line x1="308" y1="250" x2="308.0" y2="166.0" stroke="#ea580c" stroke-width="3.5" marker-end="url(#dv)"/>
  <text x="314" y="160" font-size="13" fill="#ea580c" font-weight="700">b</text>
  <circle cx="308" cy="250" r="3.5" fill="#475569"/>
  <text x="360" y="312" text-anchor="middle" font-size="15" font-weight="700" fill="#64748b">a · b = 0</text>
  <text x="360" y="330" text-anchor="middle" font-size="10.5" fill="#64748b">perpendiculaires : pas d'ombre</text>
  <rect x="475" y="120" width="190" height="170" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="518" y1="250" x2="518" y2="250" stroke="#dc2626" stroke-width="7" opacity="0.5" stroke-linecap="round"><animate attributeName="x2" values="518;518;461.8;461.8;518" keyTimes="0;0.2;0.55;0.9;1" dur="5.0s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/></line>
  <line x1="461.8" y1="187.6" x2="461.8" y2="187.6" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"><animate attributeName="x2" values="461.8;461.8;461.8;461.8;461.8" keyTimes="0;0.2;0.55;0.9;1" dur="5.0s" repeatCount="indefinite"/><animate attributeName="y2" values="187.6;187.6;250.0;250.0;187.6" keyTimes="0;0.2;0.55;0.9;1" dur="5.0s" repeatCount="indefinite"/></line>
  <line x1="518" y1="250" x2="614" y2="250" stroke="#2563eb" stroke-width="3.5" marker-end="url(#du)"/>
  <text x="618" y="255" font-size="13" fill="#2563eb" font-weight="700">a</text>
  <line x1="518" y1="250" x2="461.8" y2="187.6" stroke="#ea580c" stroke-width="3.5" marker-end="url(#dv)"/>
  <text x="448" y="182" font-size="13" fill="#ea580c" font-weight="700">b</text>
  <circle cx="518" cy="250" r="3.5" fill="#475569"/>
  <text x="570" y="312" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">a · b &lt; 0</text>
  <text x="570" y="330" text-anchor="middle" font-size="10.5" fill="#64748b">sens opposés : l'ombre est négative</text>
  <text x="360" y="351" text-anchor="middle" font-size="12.5" fill="#1b2a4a">Comme pousser un chariot : dans le sens du mouvement vous aidez (positif) ;</text>
  <text x="360" y="368" text-anchor="middle" font-size="12.5" fill="#1b2a4a">perpendiculairement vous n'aidez pas (zéro) ; à contre-sens vous freinez (négatif).</text>
</svg>
