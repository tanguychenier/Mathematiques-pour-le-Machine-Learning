<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="720" height="380" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="718" height="378" rx="14" fill="none" stroke="#e2e8f0"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1b2a4a">Convexe ou non : pourquoi ça change tout pour la descente</text>
  <text x="360" y="53" text-anchor="middle" font-size="12.5" fill="#64748b">On lâche une bille (la descente de gradient). Où s'arrête-t-elle ?</text>

  <rect x="28" y="74" width="332" height="244" rx="9" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="194" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#16a34a">Convexe : une seule cuvette</text>
  <polyline points="55,206.2 59,209.0 63,211.7 67,214.2 71,216.7 75,219.1 79,221.4 83,223.7 87,225.8 91,227.8 95,229.8 99,231.6 103,233.4 107,235.1 111,236.7 115,238.2 119,239.6 123,240.9 127,242.1 131,243.3 135,244.3 139,245.3 143,246.2 147,247.0 151,247.6 155,248.2 159,248.8 163,249.2 167,249.5 171,249.8 175,249.9 179,250.0 183,250.0 187,249.9 191,249.7 195,249.4 199,249.0 203,248.5 207,248.0 211,247.3 215,246.6 219,245.7 223,244.8 227,243.8 231,242.7 235,241.5 239,240.3 243,238.9 247,237.4 251,235.9 255,234.2 259,232.5 263,230.7 267,228.8 271,226.8 275,224.7 279,222.6 283,220.3 287,217.9 291,215.5 295,213.0 299,210.3 303,207.6" fill="none" stroke="#16a34a" stroke-width="3"/>
  <circle cx="180" cy="250.0" r="4" fill="#16a34a"/>
  <text x="180" y="270" text-anchor="middle" font-size="11" fill="#15803d">le vrai fond</text>
  <circle r="8" fill="#f59e0b" stroke="#b45309" stroke-width="1.5"><animate attributeName="cx" values="80;110;140;162;178;180;180;80" keyTimes="0;0.1;0.2;0.32;0.42;0.5;0.9;1" dur="6.0s" repeatCount="indefinite"/><animate attributeName="cy" values="222.0;236.3;245.5;249.1;250.0;250.0;250.0;222.0" keyTimes="0;0.1;0.2;0.32;0.42;0.5;0.9;1" dur="6.0s" repeatCount="indefinite"/></circle>
  <text x="194" y="306" text-anchor="middle" font-size="11" fill="#64748b">où qu'on la lâche, elle atteint le fond unique</text>

  <rect x="360" y="74" width="332" height="244" rx="9" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="526" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">Non convexe : bosselé</text>
  <polyline points="415,177.7 419,179.0 423,180.8 427,183.2 431,186.2 435,190.0 439,194.6 443,199.7 447,205.5 451,211.5 455,217.4 459,223.1 463,228.0 467,231.8 471,234.2 475,235.0 479,234.2 483,231.8 487,228.0 491,223.1 495,217.5 499,211.5 503,205.5 507,199.8 511,194.7 515,190.2 519,186.6 523,183.8 527,181.8 531,180.6 535,180.3 539,180.7 543,182.1 547,184.5 551,187.9 555,192.6 559,198.5 563,205.7 567,214.0 571,223.3 575,233.2 579,243.3 583,252.9 587,261.4 591,268.2 595,272.9 599,274.9 603,274.2 607,270.8 611,265.1 615,257.3 619,248.2 623,238.3 627,228.2 631,218.5 635,209.7 639,201.8 643,195.2 647,189.8 651,185.5 655,182.3 659,179.9 663,178.2" fill="none" stroke="#dc2626" stroke-width="3"/>
  <circle cx="600" cy="275.0" r="4" fill="#16a34a"/>
  <text x="600" y="295" text-anchor="middle" font-size="11" fill="#15803d">le vrai fond (non atteint)</text>
  <circle r="8" fill="#f59e0b" stroke="#b45309" stroke-width="1.5"><animate attributeName="cx" values="442;456;468;474;475;475;442" keyTimes="0;0.12;0.26;0.4;0.5;0.9;1" dur="6.0s" repeatCount="indefinite"/><animate attributeName="cy" values="198.4;218.9;232.5;234.9;235.0;235.0;198.4" keyTimes="0;0.12;0.26;0.4;0.5;0.9;1" dur="6.0s" repeatCount="indefinite"/></circle>
  <text x="475" y="221" text-anchor="middle" font-size="11" fill="#b91c1c">coincée ici</text>

  <text x="360" y="340" text-anchor="middle" font-size="12.5" fill="#1b2a4a">Sur une cuvette unique, la descente trouve toujours la meilleure solution.</text>
  <text x="360" y="360" text-anchor="middle" font-size="12.5" fill="#1b2a4a">Sur un paysage bosselé, elle peut rester bloquée dans un creux médiocre (un minimum local).</text>
</svg>
