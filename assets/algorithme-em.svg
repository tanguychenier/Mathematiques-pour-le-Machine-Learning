  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1b2a4a">L'algorithme EM : deux cloches qui trouvent leurs groupes</text>
  <text x="360" y="53" text-anchor="middle" font-size="12.5" fill="#64748b">On part de deux cloches mal placées. À chaque tour, elles se recentrent sur leurs points, jusqu'à coller aux groupes.</text>

