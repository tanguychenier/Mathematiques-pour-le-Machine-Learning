  <text x="568" y="320" font-size="11.5" fill="#1b2a4a"><tspan font-weight="700" fill="#0f766e">E</tspan> : chaque point vote</text>
  <text x="568" y="335" font-size="11.5" fill="#1b2a4a">pour les cloches.</text>
  <text x="568" y="352" font-size="11.5" fill="#1b2a4a"><tspan font-weight="700" fill="#0f766e">M</tspan> : on recentre, on répète.</text>

  <text x="300" y="346" text-anchor="middle" font-size="12.5" fill="#1b2a4a">EM alterne deviner l'appartenance des points et recentrer les cloches,</text>
  <text x="300" y="364" text-anchor="middle" font-size="12.5" fill="#1b2a4a">jusqu'à ce que les deux gaussiennes épousent les deux groupes.</text>
