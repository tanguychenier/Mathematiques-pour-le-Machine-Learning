  <text x="360" y="346" text-anchor="middle" font-size="12.5" fill="#1b2a4a">On ajoute une dimension (ici la hauteur x²) : dans cet espace relevé, une simple droite sépare les deux classes.</text>
  <text x="360" y="366" text-anchor="middle" font-size="11" fill="#94a3b8">Le « noyau » calcule cette séparation sans jamais construire la nouvelle dimension : d'où sa rapidité.</text>
