<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="720" height="360" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="718" height="358" rx="14" fill="none" stroke="#e2e8f0"/>
  <text x="360" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#1b2a4a">Lire la formule du coût, morceau par morceau</text>
  <line x1="60" y1="232" x2="660" y2="232" stroke="#eef2f7" stroke-width="1"/>
    <text x="196" y="165" font-size="26" font-weight="600" fill="#1b2a4a">J(θ)</text>
  <text x="262" y="165" font-size="26" fill="#1b2a4a">=</text>
  <text x="299" y="156" font-size="17" fill="#1b2a4a" text-anchor="middle">1</text>
  <line x1="286" y1="161" x2="312" y2="161" stroke="#1b2a4a" stroke-width="1.4"/>
  <text x="299" y="178" font-size="17" fill="#1b2a4a" text-anchor="middle">n</text>
  <text x="342" y="171" font-size="40" fill="#1b2a4a">∑</text>
  <text x="351" y="145" font-size="12" fill="#64748b" text-anchor="middle">n</text>
  <text x="351" y="189" font-size="12" fill="#64748b" text-anchor="middle">i=1</text>
  <text x="388" y="165" font-size="26" fill="#1b2a4a">(</text>
  <text x="402" y="165" font-size="26" fill="#1b2a4a">f(xᵢ)</text>
  <text x="470" y="165" font-size="26" fill="#1b2a4a">−</text>
  <text x="492" y="165" font-size="26" fill="#1b2a4a">yᵢ</text>
  <text x="524" y="165" font-size="26" fill="#1b2a4a">)²</text>
  <rect x="396" y="131" width="74" height="46" rx="6" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.0;0.004;0.1389;0.1429;1" dur="18.9s" repeatCount="indefinite"/></rect>
  <rect x="486" y="131" width="40" height="46" rx="6" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.1429;0.1469;0.2817;0.2857;1" dur="18.9s" repeatCount="indefinite"/></rect>
  <rect x="396" y="131" width="130" height="46" rx="6" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2857;0.2897;0.4246;0.4286;1" dur="18.9s" repeatCount="indefinite"/></rect>
  <rect x="382" y="131" width="176" height="46" rx="6" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.4286;0.4326;0.5674;0.5714;1" dur="18.9s" repeatCount="indefinite"/></rect>
  <rect x="336" y="131" width="46" height="46" rx="6" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5714;0.5754;0.7103;0.7143;1" dur="18.9s" repeatCount="indefinite"/></rect>
  <rect x="280" y="131" width="42" height="46" rx="6" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.7143;0.7183;0.8531;0.8571;1" dur="18.9s" repeatCount="indefinite"/></rect>
  <rect x="190" y="131" width="68" height="46" rx="6" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.8571;0.8611;0.996;1.0;1" dur="18.9s" repeatCount="indefinite"/></rect>
  <text x="360" y="300" text-anchor="middle" font-size="15" fill="#ea580c" font-weight="600" opacity="0">f(xᵢ) : la PRÉDICTION du modèle pour le jour i (sa réponse)<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.0;0.004;0.1389;0.1429;1" dur="18.9s" repeatCount="indefinite"/></text>
  <text x="360" y="300" text-anchor="middle" font-size="15" fill="#ea580c" font-weight="600" opacity="0">yᵢ : la VRAIE valeur observée ce jour-là (la réalité)<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.1429;0.1469;0.2817;0.2857;1" dur="18.9s" repeatCount="indefinite"/></text>
  <text x="360" y="300" text-anchor="middle" font-size="15" fill="#ea580c" font-weight="600" opacity="0">f(xᵢ) − yᵢ : l'ERREUR, de combien le modèle se trompe ce jour-là<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2857;0.2897;0.4246;0.4286;1" dur="18.9s" repeatCount="indefinite"/></text>
  <text x="360" y="300" text-anchor="middle" font-size="15" fill="#ea580c" font-weight="600" opacity="0">( … )² : au CARRÉ, l'erreur devient positive et les gros ratés pèsent lourd<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.4286;0.4326;0.5674;0.5714;1" dur="18.9s" repeatCount="indefinite"/></text>
  <text x="360" y="300" text-anchor="middle" font-size="15" fill="#ea580c" font-weight="600" opacity="0">∑ : on ADDITIONNE l'erreur de tous les jours, de i = 1 à n<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5714;0.5754;0.7103;0.7143;1" dur="18.9s" repeatCount="indefinite"/></text>
  <text x="360" y="300" text-anchor="middle" font-size="15" fill="#ea580c" font-weight="600" opacity="0">1/n : on divise par n, c'est la MOYENNE des erreurs<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.7143;0.7183;0.8531;0.8571;1" dur="18.9s" repeatCount="indefinite"/></text>
  <text x="360" y="300" text-anchor="middle" font-size="15" fill="#ea580c" font-weight="600" opacity="0">J(θ) : le COÛT du réglage θ. Petit = bon. Apprendre, c'est le rendre minimal.<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.8571;0.8611;0.996;1.0;1" dur="18.9s" repeatCount="indefinite"/></text>
  <text x="360" y="330" text-anchor="middle" font-size="12" fill="#94a3b8">chaque morceau de la formule, un par un</text>
</svg>
