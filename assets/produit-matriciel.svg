  <rect x="96" y="194" width="48" height="44" rx="4" fill="#eef2ff" stroke="#cbd5e1"/><text x="120" y="222" text-anchor="middle" font-size="18" fill="#1b2a4a">3</text>
  <rect x="144" y="194" width="48" height="44" rx="4" fill="#eef2ff" stroke="#cbd5e1"/><text x="168" y="222" text-anchor="middle" font-size="18" fill="#1b2a4a">4</text>
  <path d="M 88 146 L 84 146 L 84 242 L 88 242" fill="none" stroke="#475569" stroke-width="2"/><path d="M 200 146 L 204 146 L 204 242 L 200 242" fill="none" stroke="#475569" stroke-width="2"/>
