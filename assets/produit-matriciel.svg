  <text x="304" y="200" text-anchor="middle" font-size="22" fill="#475569">×</text>
  <rect x="330" y="150" width="48" height="44" rx="4" fill="#ecfeff" stroke="#cbd5e1"/><text x="354" y="178" text-anchor="middle" font-size="18" fill="#1b2a4a">5</text>
  <rect x="378" y="150" width="48" height="44" rx="4" fill="#ecfeff" stroke="#cbd5e1"/><text x="402" y="178" text-anchor="middle" font-size="18" fill="#1b2a4a">6</text>
  <rect x="330" y="194" width="48" height="44" rx="4" fill="#ecfeff" stroke="#cbd5e1"/><text x="354" y="222" text-anchor="middle" font-size="18" fill="#1b2a4a">7</text>
  <rect x="378" y="194" width="48" height="44" rx="4" fill="#ecfeff" stroke="#cbd5e1"/><text x="402" y="222" text-anchor="middle" font-size="18" fill="#1b2a4a">8</text>
