  <text x="360" y="320" text-anchor="middle" font-size="16" fill="#1b2a4a" opacity="0">c<tspan font-size="11" dy="3">11</tspan><tspan dy="-3"> = 1×5 + 2×7 = </tspan><tspan font-weight="700" fill="#ea580c">19</tspan><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.000;0.020;0.230;0.250;1" dur="12.0s" repeatCount="indefinite"/></text><text x="360" y="320" text-anchor="middle" font-size="16" fill="#1b2a4a" opacity="0">c<tspan font-size="11" dy="3">12</tspan><tspan dy="-3"> = 1×6 + 2×8 = </tspan><tspan font-weight="700" fill="#ea580c">22</tspan><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.250;0.270;0.480;0.500;1" dur="12.0s" repeatCount="indefinite"/></text><text x="360" y="320" text-anchor="middle" font-size="16" fill="#1b2a4a" opacity="0">c<tspan font-size="11" dy="3">21</tspan><tspan dy="-3"> = 3×5 + 4×7 = </tspan><tspan font-weight="700" fill="#ea580c">43</tspan><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.500;0.520;0.730;0.750;1" dur="12.0s" repeatCount="indefinite"/></text><text x="360" y="320" text-anchor="middle" font-size="16" fill="#1b2a4a" opacity="0">c<tspan font-size="11" dy="3">22</tspan><tspan dy="-3"> = 3×6 + 4×8 = </tspan><tspan font-weight="700" fill="#ea580c">50</tspan><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.750;0.770;0.980;1.000;1" dur="12.0s" repeatCount="indefinite"/></text>
  <text x="360" y="358" text-anchor="middle" font-size="12.5" fill="#1b2a4a">Les « p » du milieu doivent coïncider : (m×p)·(p×n) = (m×n). Ici (2×2)·(2×2) = (2×2).</text>
</svg>
