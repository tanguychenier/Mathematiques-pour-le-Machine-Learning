  <text x="584" y="178" text-anchor="middle" font-size="18" fill="#ea580c" font-weight="700" opacity="0">19<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.000;0.020;1" dur="12.0s" repeatCount="indefinite"/></text><text x="632" y="178" text-anchor="middle" font-size="18" fill="#ea580c" font-weight="700" opacity="0">22<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.250;0.270;1" dur="12.0s" repeatCount="indefinite"/></text><text x="584" y="222" text-anchor="middle" font-size="18" fill="#ea580c" font-weight="700" opacity="0">43<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.500;0.520;1" dur="12.0s" repeatCount="indefinite"/></text><text x="632" y="222" text-anchor="middle" font-size="18" fill="#ea580c" font-weight="700" opacity="0">50<animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.750;0.770;1" dur="12.0s" repeatCount="indefinite"/></text>
  <text x="608" y="262" text-anchor="middle" font-size="13" fill="#ea580c">C = A×B</text>

  <rect x="94" width="100" height="44" rx="5" fill="none" stroke="#f59e0b" stroke-width="3" y="150"><animate attributeName="y" values="150;150;194;194;150" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="12.0s" repeatCount="indefinite"/></rect>
