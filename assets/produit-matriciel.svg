<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="720" height="380" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="718" height="378" rx="14" fill="none" stroke="#e2e8f0"/>
  <text x="360" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1b2a4a">Le produit matriciel : chaque case = une ligne fois une colonne</text>
  <text x="360" y="53" text-anchor="middle" font-size="12.5" fill="#64748b">On glisse la ligne i de A « par-dessus » la colonne j de B, on multiplie terme à terme, et on additionne.</text>

  <rect x="96" y="150" width="48" height="44" rx="4" fill="#eef2ff" stroke="#cbd5e1"/><text x="120" y="178" text-anchor="middle" font-size="18" fill="#1b2a4a">1</text>
