<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="hill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </radialGradient>
    <marker id="gu" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#16a34a"/></marker>
    <marker id="gd" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#dc2626"/></marker>
  </defs>
  <rect width="720" height="380" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="718" height="378" rx="14" fill="none" stroke="#e2e8f0"/>
  <text x="360" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1b2a4a">Le gradient : la direction qui monte le plus vite</text>
  <text x="360" y="53" text-anchor="middle" font-size="12.5" fill="#64748b">Vue de dessus d'une colline. Les cercles relient les points de même altitude (comme une carte de randonnée).</text>

  <circle cx="360" cy="218" r="174" fill="url(#hill)" opacity="0.55"/>
  <circle cx="360" cy="218" r="42" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="3 4"/>
  <circle cx="360" cy="218" r="82" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="3 4"/>
  <circle cx="360" cy="218" r="122" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="3 4"/>
  <circle cx="360" cy="218" r="162" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="3 4"/>
  <text x="360" y="215" text-anchor="middle" font-size="12" fill="#b45309" font-weight="700">sommet</text>
  <text x="360" y="230" text-anchor="middle" font-size="10.5" fill="#b45309">(altitude max)</text>

  <!-- -gradient : descente la plus raide -->
  <line x1="260.1" y1="288.0" x2="196.2" y2="332.7" stroke="#dc2626" stroke-width="4" marker-end="url(#gd)">
    <animate attributeName="opacity" values="0.25;1;1;0.25" keyTimes="0;0.25;0.8;1" dur="6.0s" repeatCount="indefinite"/>
  </line>
  <!-- gradient : montee la plus raide -->
  <line x1="260.1" y1="288.0" x2="324.0" y2="243.2" stroke="#16a34a" stroke-width="4" marker-end="url(#gu)">
    <animate attributeName="opacity" values="0.25;1;1;0.25" keyTimes="0;0.25;0.8;1" dur="6.0s" repeatCount="indefinite"/>
  </line>
  <circle cx="260.1" cy="288.0" r="6" fill="#1b2a4a"/>
  <text x="252" y="310" text-anchor="end" font-size="12" fill="#1b2a4a">vous êtes ici</text>

  <text x="334" y="241" font-size="13.5" fill="#15803d" font-weight="700">∇f : monte le plus vite</text>
  <text x="186" y="349" text-anchor="end" font-size="13.5" fill="#b91c1c" font-weight="700">−∇f : descend le plus vite</text>

  <text x="360" y="367" text-anchor="middle" font-size="13" fill="#1b2a4a">Le gradient ∇f vise la pente la plus raide vers le haut. La descente de gradient suit l'inverse (−∇f) pour rejoindre le creux.</text>
</svg>
