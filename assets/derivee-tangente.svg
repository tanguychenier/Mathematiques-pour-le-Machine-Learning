<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="720" height="380" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="718" height="378" rx="14" fill="none" stroke="#e2e8f0"/>
  <text x="360" y="31" text-anchor="middle" font-size="19" font-weight="700" fill="#1b2a4a">La dérivée : la pente de la courbe juste à ce point</text>
  <text x="360" y="50" text-anchor="middle" font-size="12" fill="#64748b">On relie deux points (la sécante). En rapprochant le second du premier, la sécante devient la tangente.</text>

  <path d="M 120.0 276.0 L 130.0 275.9 L 140.0 275.8 L 150.0 275.4 L 160.0 275.0 L 170.0 274.5 L 180.0 273.8 L 190.0 273.0 L 200.0 272.1 L 210.0 271.0 L 220.0 269.8 L 230.0 268.5 L 240.0 267.1 L 250.0 265.6 L 260.0 263.9 L 270.0 262.1 L 280.0 260.2 L 290.0 258.2 L 300.0 256.0 L 310.0 253.8 L 320.0 251.4 L 330.0 248.8 L 340.0 246.2 L 350.0 243.4 L 360.0 240.5 L 370.0 237.5 L 380.0 234.4 L 390.0 231.1 L 400.0 227.7 L 410.0 224.2 L 420.0 220.6 L 430.0 216.8 L 440.0 212.9 L 450.0 208.9 L 460.0 204.8 L 470.0 200.5 L 480.0 196.2 L 490.0 191.7 L 500.0 187.0 L 510.0 182.3 L 520.0 177.4 L 530.0 172.5 L 540.0 167.3 L 550.0 162.1 L 560.0 156.7 L 570.0 151.3 L 580.0 145.7 L 590.0 139.9 L 600.0 134.1 L 610.0 128.1 L 620.0 122.0" fill="none" stroke="#1b2a4a" stroke-width="3"/>
  <text x="588" y="114" font-size="13" fill="#1b2a4a" font-weight="600">f</text>

  <line x1="130" y1="304.4" x2="610" y2="171.4" stroke="#16a34a" stroke-width="2" stroke-dasharray="6 4" opacity="0.7"/>
  <text x="600" y="165" text-anchor="end" font-size="12" fill="#15803d" font-weight="700">tangente (pente = f '(x))</text>

  <line x1="130" y1="328.9" x2="610" y2="141.2" stroke="#2563eb" stroke-width="2.5">
    <animate attributeName="y1" values="328.9;321.0;314.3;310.4;307.1;304.4;304.4;328.9" keyTimes="0;0.13;0.26;0.39;0.52;0.65;0.9;1" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0.5 0 0.5 1"/><animate attributeName="y2" values="141.2;151.0;159.1;164.0;168.1;171.4;171.4;141.2" keyTimes="0;0.13;0.26;0.39;0.52;0.65;0.9;1" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0.5 0 0.5 1"/>
  </line>

  <circle cx="345.0" cy="244.8" r="6" fill="#ea580c"/>
  <text x="335" y="267" text-anchor="end" font-size="13" fill="#ea580c" font-weight="700">x</text>
  <circle cx="530.0" cy="172.5" r="6" fill="#2563eb">
    <animate attributeName="cx" values="530.0;470.0;420.0;390.0;365.0;345.0;345.0;530.0" keyTimes="0;0.13;0.26;0.39;0.52;0.65;0.9;1" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0.5 0 0.5 1"/><animate attributeName="cy" values="172.5;200.5;220.6;231.1;239.0;244.8;244.8;172.5" keyTimes="0;0.13;0.26;0.39;0.52;0.65;0.9;1" dur="7s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0.5 0 0.5 1"/>
  </circle>

  <text x="150" y="120" font-size="13.5" fill="#1b2a4a">pente de la sécante = <tspan font-weight="700">(f(x+h) − f(x)) / h</tspan></text>
  <text x="150" y="139" font-size="11.5" fill="#64748b">h est l'écart entre les deux points. On le fait tendre vers 0.</text>

  <text x="360" y="362" text-anchor="middle" font-size="12.5" fill="#1b2a4a">La dérivée, c'est la pente de la route juste sous vos pieds : à quel point ça monte à cet instant précis.</text>
</svg>
