<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="eb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#2563eb"/></marker>
    <marker id="eo" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#ea580c"/></marker>
  </defs>
  <rect width="720" height="380" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="718" height="378" rx="14" fill="none" stroke="#e2e8f0"/>
  <text x="360" y="31" text-anchor="middle" font-size="19" font-weight="700" fill="#1b2a4a">Le vecteur propre : la direction qui ne tourne pas</text>
  <text x="360" y="50" text-anchor="middle" font-size="12" fill="#64748b">Une matrice déforme l'espace. Presque toutes les flèches changent de direction ; le vecteur propre reste sur sa droite.</text>

  <line x1="99.6" y1="272.4" x2="292.8" y2="79.2" stroke="#fdba74" stroke-width="1.6" stroke-dasharray="5 5"/>
  <text x="297" y="77" font-size="10.5" fill="#fb923c">la droite du vecteur propre</text>
  <circle cx="150" cy="222" r="4" fill="#475569"/>
  <text x="141" y="238" text-anchor="end" font-size="13" fill="#475569">O</text>

  <line x1="150" y1="222" x2="192.0" y2="222.0" stroke="#2563eb" stroke-width="3.5" marker-end="url(#eb)">
    <animate attributeName="x2" values="192.0;192.0;234.0;234.0;192.0" keyTimes="0;0.18;0.5;0.9;1" dur="6.5s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/><animate attributeName="y2" values="222.0;222.0;188.4;188.4;222.0" keyTimes="0;0.18;0.5;0.9;1" dur="6.5s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
  </line>
  <line x1="150" y1="222" x2="192.0" y2="180.0" stroke="#ea580c" stroke-width="3.5" marker-end="url(#eo)">
    <animate attributeName="x2" values="192.0;192.0;267.6;267.6;192.0" keyTimes="0;0.18;0.5;0.9;1" dur="6.5s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/><animate attributeName="y2" values="180.0;180.0;104.4;104.4;180.0" keyTimes="0;0.18;0.5;0.9;1" dur="6.5s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>
  </line>

  <rect x="372" y="150" width="14" height="14" rx="3" fill="#ea580c"/>
  <text x="394" y="155" font-size="14" font-weight="700" fill="#c2410c">Vecteur propre</text>
  <text x="394" y="173" font-size="12.5" fill="#1b2a4a">Il reste sur sa droite : il est seulement</text>
  <text x="394" y="190" font-size="12.5" fill="#1b2a4a">étiré, ici d'un facteur <tspan font-weight="700" fill="#c2410c">×2,8</tspan>.</text>
  <text x="394" y="208" font-size="11.5" fill="#64748b">Ce facteur, c'est la valeur propre λ.</text>

  <rect x="372" y="244" width="14" height="14" rx="3" fill="#2563eb"/>
  <text x="394" y="249" font-size="14" font-weight="700" fill="#1d4ed8">Vecteur quelconque</text>
  <text x="394" y="267" font-size="12.5" fill="#1b2a4a">La transformation le fait <tspan font-weight="700">tourner</tspan> :</text>
  <text x="394" y="284" font-size="12.5" fill="#1b2a4a">il change de direction.</text>

  <text x="360" y="364" text-anchor="middle" font-size="12.5" fill="#1b2a4a">Comme une pâte qu'on étire : un trait déjà aligné avec l'étirement reste droit (plus long) ; les autres penchent.</text>
</svg>
