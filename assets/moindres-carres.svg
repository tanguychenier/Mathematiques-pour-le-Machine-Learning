<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="720" height="460" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="718" height="458" rx="14" fill="none" stroke="#e2e8f0"/>

  <text x="360" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1b2a4a">Pourquoi élever au carré ? L'erreur devient une aire</text>
  <text x="360" y="54" text-anchor="middle" font-size="12.5" fill="#64748b">Le côté du carré, c'est l'erreur (l'écart vertical entre le point et la droite). Son aire, c'est l'erreur au carré.</text>

  <line x1="90" y1="330" x2="660" y2="210" stroke="#6366f1" stroke-width="3.5"/>
  <text x="600" y="198" font-size="12.5" fill="#6366f1" font-weight="600">droite (modèle)</text>

  <!-- petit point : petite erreur -> toute petite aire (contraste) -->
  <rect x="520" y="236" width="25" height="25" fill="#f97316" fill-opacity="0.16" stroke="#f97316" stroke-width="1.5"/>
  <line x1="520" y1="236" x2="520" y2="261" stroke="#f97316" stroke-width="2.5"/>
  <circle cx="520" cy="261" r="6.5" fill="#0ea5a4" stroke="#fff" stroke-width="1.5"/>
  <text x="556" y="250" font-size="12" fill="#64748b">petite erreur,</text>
  <text x="556" y="266" font-size="12" fill="#64748b">toute petite aire</text>

  <!-- grand point : l'erreur se deplie en carre (anime) -->
  <rect x="260" y="293" height="90" fill="#f97316" fill-opacity="0.20" stroke="#f97316" stroke-width="2">
    <animate attributeName="width" values="0;0;90;90;0" keyTimes="0;0.12;0.5;0.86;1" dur="4.5s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.3 0 0.2 1;0 0 1 1;0.5 0 0.5 1"/>
  </rect>
  <line x1="260" y1="293" x2="260" y2="383" stroke="#f97316" stroke-width="3.5"/>
  <circle cx="260" cy="383" r="7" fill="#0ea5a4" stroke="#fff" stroke-width="2"/>
  <path d="M 248 295 q -8 0 -8 8 v 30 q 0 8 -8 8 q 8 0 8 8 v 30 q 0 8 8 8" fill="none" stroke="#ea580c" stroke-width="1.4"/>
  <text x="205" y="338" text-anchor="end" font-size="13" fill="#ea580c" font-weight="600">erreur</text>
  <text x="205" y="356" text-anchor="end" font-size="12" fill="#ea580c">f(xᵢ) − yᵢ</text>
  <text x="305" y="343" text-anchor="middle" font-size="15" fill="#ea580c" font-weight="700" opacity="0">(erreur)²
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.55;0.86;1" dur="4.5s" repeatCount="indefinite"/>
  </text>

  <text x="360" y="424" text-anchor="middle" font-size="14" fill="#1b2a4a">Coût d'un point = ( f(xᵢ) − yᵢ )² = aire du carré</text>
  <text x="360" y="445" text-anchor="middle" font-size="12.5" fill="#64748b">On additionne l'aire de tous les carrés, puis on divise par n. Une erreur 2× plus grande donne une aire 4× plus grande.</text>
</svg>
