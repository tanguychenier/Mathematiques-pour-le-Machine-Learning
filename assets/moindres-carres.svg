<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="680" height="420" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="678" height="418" rx="14" fill="none" stroke="#e2e8f0"/>
  <text x="340" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#1b2a4a">Les moindres carrés : pourquoi élever au carré ?</text>
  <text x="340" y="54" text-anchor="middle" font-size="13" fill="#64748b">Chaque erreur devient une AIRE (un carré), toujours positive, au-dessus comme en dessous de la droite.</text>
  <line x1="90" y1="300" x2="610" y2="150" stroke="#6366f1" stroke-width="3.5"/>
  <rect x="170" y="237" width="40" height="40" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="1.5"><animate attributeName="fill-opacity" values="0.18;0.32;0.18" dur="3s" begin="0.0s" repeatCount="indefinite"/></rect>
  <line x1="170" y1="237" x2="170" y2="277" stroke="#f97316" stroke-width="2.5"/>
  <text x="216" y="257" font-size="13" fill="#ea580c" font-weight="600">−40</text>
  <circle cx="170" cy="237" r="6.5" fill="#0ea5a4" stroke="#fff" stroke-width="1.5"/>
  <rect x="300" y="239" width="50" height="50" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="1.5"><animate attributeName="fill-opacity" values="0.18;0.32;0.18" dur="3s" begin="0.4s" repeatCount="indefinite"/></rect>
  <line x1="300" y1="289" x2="300" y2="239" stroke="#f97316" stroke-width="2.5"/>
  <text x="356" y="264" font-size="13" fill="#ea580c" font-weight="600">+50</text>
  <circle cx="300" cy="289" r="6.5" fill="#0ea5a4" stroke="#fff" stroke-width="1.5"/>
  <rect x="430" y="172" width="30" height="30" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="1.5"><animate attributeName="fill-opacity" values="0.18;0.32;0.18" dur="3s" begin="0.8s" repeatCount="indefinite"/></rect>
  <line x1="430" y1="172" x2="430" y2="202" stroke="#f97316" stroke-width="2.5"/>
  <text x="466" y="187" font-size="13" fill="#ea580c" font-weight="600">−30</text>
  <circle cx="430" cy="172" r="6.5" fill="#0ea5a4" stroke="#fff" stroke-width="1.5"/>
  <rect x="540" y="170" width="40" height="40" fill="#f97316" fill-opacity="0.18" stroke="#f97316" stroke-width="1.5"><animate attributeName="fill-opacity" values="0.18;0.32;0.18" dur="3s" begin="1.2s" repeatCount="indefinite"/></rect>
  <line x1="540" y1="210" x2="540" y2="170" stroke="#f97316" stroke-width="2.5"/>
  <text x="586" y="190" font-size="13" fill="#ea580c" font-weight="600">+40</text>
  <circle cx="540" cy="210" r="6.5" fill="#0ea5a4" stroke="#fff" stroke-width="1.5"/>
  <text x="340" y="392" text-anchor="middle" font-size="13" fill="#475569">Le coût (MSE) = moyenne de ces aires. Apprendre, c'est trouver la droite qui les rend les plus petites.</text>
</svg>
