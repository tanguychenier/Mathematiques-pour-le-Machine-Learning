<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="720" height="440" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="718" height="438" rx="14" fill="none" stroke="#e2e8f0"/>

  <text x="360" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1b2a4a">La fonction de coût J(θ) : le juge qui note chaque réglage</text>
  <text x="360" y="53" text-anchor="middle" font-size="12.5" fill="#64748b">Changez la droite à gauche : à droite, J donne sa note. Plus la droite colle, plus J est petit. Apprendre, c'est descendre au fond du bol.</text>

  <line x1="360" y1="80" x2="360" y2="400" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ================= PANNEAU GAUCHE : la droite (reglage theta) ================= -->
  <text x="195" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Le réglage θ = une droite</text>
  <g stroke="#cbd5e1" stroke-width="2">
    <line x1="50" y1="100" x2="50" y2="360"/>
    <line x1="50" y1="360" x2="335" y2="360"/>
  </g>
  <g fill="#0ea5a4" stroke="#fff" stroke-width="1.5">
    <circle cx="80" cy="330" r="6"/><circle cx="130" cy="300" r="6"/><circle cx="180" cy="285" r="6"/>
    <circle cx="230" cy="250" r="6"/><circle cx="280" cy="220" r="6"/><circle cx="325" cy="185" r="6"/>
  </g>
  <line x1="55" x2="330" stroke="#f97316" stroke-width="3.5" stroke-linecap="round">
    <animate attributeName="y1" dur="5.5s" repeatCount="indefinite" values="250;290;325;345;345;250" keyTimes="0;0.25;0.5;0.7;0.9;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0.5 0 0.5 1"/>
    <animate attributeName="y2" dur="5.5s" repeatCount="indefinite" values="250;220;195;175;175;250" keyTimes="0;0.25;0.5;0.7;0.9;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0.5 0 0.5 1"/>
  </line>
  <text x="195" y="388" text-anchor="middle" font-size="12.5" fill="#64748b">on fait varier la droite (θ)</text>

  <!-- =============== PANNEAU DROIT : le cout J(theta) =============== -->
  <text x="540" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Sa note : le coût J(θ)</text>
  <g stroke="#cbd5e1" stroke-width="2">
    <line x1="395" y1="100" x2="395" y2="360"/>
    <line x1="395" y1="360" x2="690" y2="360"/>
  </g>
  <path d="M 405 150 Q 540 495 675 150" fill="none" stroke="#6366f1" stroke-width="3.5"/>
  <circle cx="540" cy="320" r="3.5" fill="#0ea5a4"/>
  <text x="540" y="342" text-anchor="middle" font-size="11.5" fill="#0ea5a4" font-weight="600">minimum (meilleur θ)</text>
  <circle r="9" fill="#f97316" stroke="#fff" stroke-width="2">
    <animate attributeName="cx" dur="5.5s" repeatCount="indefinite" values="434;478;512;540;540;434" keyTimes="0;0.25;0.5;0.7;0.9;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0.5 0 0.5 1"/>
    <animate attributeName="cy" dur="5.5s" repeatCount="indefinite" values="216;285;313;320;320;216" keyTimes="0;0.25;0.5;0.7;0.9;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0.5 0 0.5 1"/>
  </circle>
  <text x="404" y="118" font-size="12" fill="#94a3b8">coût élevé</text>
  <text x="542" y="384" text-anchor="middle" font-size="12.5" fill="#64748b">J(θ) = le coût (petit = bon)</text>
</svg>
