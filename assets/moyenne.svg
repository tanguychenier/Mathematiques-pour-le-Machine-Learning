<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="720" height="380" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="718" height="378" rx="14" fill="none" stroke="#e2e8f0"/>
  <text x="360" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1b2a4a">Diviser par n, c'est faire la moyenne</text>
  <text x="360" y="55" text-anchor="middle" font-size="12.5" fill="#64748b">Les barres inégales s'égalisent : la moyenne, c'est répartir le total également entre les n valeurs.</text>
    <line x1="120" y1="300" x2="640" y2="300" stroke="#94a3b8" stroke-width="2.5"/>
  <rect x="150" width="64" fill="#0ea5a4" fill-opacity="0.85" rx="3" y="240" height="60"><animate attributeName="y" values="240;180;180;240" keyTimes="0;0.38;0.72;1" dur="6.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/><animate attributeName="height" values="60;120;120;60" keyTimes="0;0.38;0.72;1" dur="6.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/></rect>
  <text x="182" y="320" text-anchor="middle" font-size="13" fill="#0f766e" font-weight="600">3</text>
  <rect x="240" width="64" fill="#0ea5a4" fill-opacity="0.85" rx="3" y="160" height="140"><animate attributeName="y" values="160;180;180;160" keyTimes="0;0.38;0.72;1" dur="6.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/><animate attributeName="height" values="140;120;120;140" keyTimes="0;0.38;0.72;1" dur="6.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/></rect>
  <text x="272" y="320" text-anchor="middle" font-size="13" fill="#0f766e" font-weight="600">7</text>
  <rect x="330" width="64" fill="#0ea5a4" fill-opacity="0.85" rx="3" y="200" height="100"><animate attributeName="y" values="200;180;180;200" keyTimes="0;0.38;0.72;1" dur="6.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/><animate attributeName="height" values="100;120;120;100" keyTimes="0;0.38;0.72;1" dur="6.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/></rect>
  <text x="362" y="320" text-anchor="middle" font-size="13" fill="#0f766e" font-weight="600">5</text>
  <rect x="420" width="64" fill="#0ea5a4" fill-opacity="0.85" rx="3" y="120" height="180"><animate attributeName="y" values="120;180;180;120" keyTimes="0;0.38;0.72;1" dur="6.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/><animate attributeName="height" values="180;120;120;180" keyTimes="0;0.38;0.72;1" dur="6.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/></rect>
  <text x="452" y="320" text-anchor="middle" font-size="13" fill="#0f766e" font-weight="600">9</text>
  <rect x="510" width="64" fill="#0ea5a4" fill-opacity="0.85" rx="3" y="180" height="120"><animate attributeName="y" values="180;180;180;180" keyTimes="0;0.38;0.72;1" dur="6.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/><animate attributeName="height" values="120;120;120;120" keyTimes="0;0.38;0.72;1" dur="6.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/></rect>
  <text x="542" y="320" text-anchor="middle" font-size="13" fill="#0f766e" font-weight="600">6</text>
  <line x1="130" y1="180" x2="630" y2="180" stroke="#f97316" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="624" y="171" text-anchor="end" font-size="14" fill="#ea580c" font-weight="700">moyenne = 6</text>
  <text x="360" y="345" text-anchor="middle" font-size="15" fill="#1b2a4a">total = 3 + 7 + 5 + 9 + 6 = 30,  puis  30 ÷ 5 = <tspan font-weight="700" fill="#ea580c">6</tspan></text>
</svg>
