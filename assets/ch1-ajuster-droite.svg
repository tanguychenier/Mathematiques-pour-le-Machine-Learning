<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="680" height="440" rx="14" fill="#fbfdff"/>
  <rect x="1" y="1" width="678" height="438" rx="14" fill="none" stroke="#e2e8f0"/>

  <text x="340" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1b2a4a">Apprendre, c'est ajuster une droite aux données</text>
  <text x="340" y="58" text-anchor="middle" font-size="13" fill="#64748b">La droite pivote jusqu'à coller au nuage de points (exemple&#160;: température → ventes de glaces)</text>

  <!-- grille -->
  <g stroke="#eef2f7" stroke-width="1">
    <line x1="70" y1="120" x2="620" y2="120"/>
    <line x1="70" y1="180" x2="620" y2="180"/>
    <line x1="70" y1="240" x2="620" y2="240"/>
    <line x1="70" y1="300" x2="620" y2="300"/>
    <line x1="208" y1="80" x2="208" y2="380"/>
    <line x1="346" y1="80" x2="346" y2="380"/>
    <line x1="484" y1="80" x2="484" y2="380"/>
  </g>

  <!-- axes -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <g stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <line x1="70" y1="380" x2="70" y2="74"/>
    <line x1="70" y1="380" x2="626" y2="380"/>
  </g>
  <text x="348" y="410" text-anchor="middle" font-size="13" fill="#475569">température</text>
  <text x="34" y="230" text-anchor="middle" font-size="13" fill="#475569" transform="rotate(-90 34 230)">ventes</text>

  <!-- droite ajustée (animée : mauvais ajustement → bon ajustement, en boucle) -->
  <line x1="70" x2="620" stroke="#f97316" stroke-width="4" stroke-linecap="round" opacity="0.95">
    <animate attributeName="y1" dur="5s" repeatCount="indefinite"
             values="205;340;340;205" keyTimes="0;0.42;0.72;1"
             calcMode="spline" keySplines="0.45 0 0.2 1; 0 0 1 1; 0.5 0 0.2 1"/>
    <animate attributeName="y2" dur="5s" repeatCount="indefinite"
             values="245;120;120;245" keyTimes="0;0.42;0.72;1"
             calcMode="spline" keySplines="0.45 0 0.2 1; 0 0 1 1; 0.5 0 0.2 1"/>
  </line>

  <!-- points de données -->
  <g fill="#0ea5a4" stroke="#ffffff" stroke-width="1.5">
    <circle cx="120" cy="326" r="6.5"><animate attributeName="r" values="6.5;8;6.5" dur="2.4s" begin="0s"   repeatCount="indefinite"/></circle>
    <circle cx="185" cy="292" r="6.5"><animate attributeName="r" values="6.5;8;6.5" dur="2.4s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="278" r="6.5"><animate attributeName="r" values="6.5;8;6.5" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="238" r="6.5"><animate attributeName="r" values="6.5;8;6.5" dur="2.4s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="390" cy="222" r="6.5"><animate attributeName="r" values="6.5;8;6.5" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="460" cy="178" r="6.5"><animate attributeName="r" values="6.5;8;6.5" dur="2.4s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="530" cy="162" r="6.5"><animate attributeName="r" values="6.5;8;6.5" dur="2.4s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="590" cy="130" r="6.5"><animate attributeName="r" values="6.5;8;6.5" dur="2.4s" begin="2.1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- legende -->
  <g font-size="13">
    <circle cx="430" cy="404" r="6.5" fill="#0ea5a4" stroke="#fff" stroke-width="1.5"/>
    <text x="442" y="408" fill="#475569">données observées</text>
    <rect x="556" y="400" width="22" height="5" rx="2.5" fill="#f97316"/>
    <text x="584" y="408" fill="#475569">modèle</text>
  </g>
</svg>
